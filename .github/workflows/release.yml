name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  ZIG_VERSION: '0.15.2'

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-latest        # arm64
            os: macos
            arch: arm64
            goos: darwin
            goarch: arm64
            bin_name: chasm-macos-arm64
            archive_ext: tar.gz
            zig_platform: aarch64-macos

          - runner: macos-13            # x86_64 (Intel)
            os: macos
            arch: x86_64
            goos: darwin
            goarch: amd64
            bin_name: chasm-macos-x86_64
            archive_ext: tar.gz
            zig_platform: x86_64-macos

          - runner: ubuntu-latest
            os: linux
            arch: x86_64
            goos: linux
            goarch: amd64
            bin_name: chasm-linux-x86_64
            archive_ext: tar.gz
            zig_platform: x86_64-linux

          - runner: windows-latest
            os: windows
            arch: x86_64
            goos: windows
            goarch: amd64
            bin_name: chasm-windows-x86_64.exe
            archive_ext: zip
            zig_platform: x86_64-windows

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig (Unix)
        if: runner.os != 'Windows'
        run: |
          ZIG_DIR="zig-${{ matrix.zig_platform }}-${ZIG_VERSION}"
          ZIG_ARCHIVE="${ZIG_DIR}.tar.xz"
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/${ZIG_ARCHIVE}" -o "/tmp/${ZIG_ARCHIVE}"
          tar -xJf "/tmp/${ZIG_ARCHIVE}" -C /tmp
          echo "/tmp/${ZIG_DIR}" >> $GITHUB_PATH

      - name: Install Zig (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ZigDir = "zig-${{ matrix.zig_platform }}-${env:ZIG_VERSION}"
          $ZigArchive = "${ZigDir}.zip"
          $Url = "https://ziglang.org/download/${env:ZIG_VERSION}/${ZigArchive}"
          Invoke-WebRequest -Uri $Url -OutFile "$env:TEMP\${ZigArchive}" -UseBasicParsing
          Expand-Archive -Path "$env:TEMP\${ZigArchive}" -DestinationPath "$env:TEMP"
          echo "$env:TEMP\${ZigDir}" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build bootstrap binary (Unix)
        if: matrix.os != 'windows'
        run: |
          cd archive/zig-compiler
          zig build -Doptimize=ReleaseFast
          cp zig-out/bin/chasm ../../bootstrap/bin/${{ matrix.bin_name }}
          chmod +x ../../bootstrap/bin/${{ matrix.bin_name }}

      - name: Build bootstrap binary (Windows)
        if: matrix.os == 'windows'
        run: |
          cd archive/zig-compiler
          zig build -Doptimize=ReleaseFast
          cp zig-out/bin/chasm.exe ../../bootstrap/bin/${{ matrix.bin_name }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build CLI (Unix)
        if: matrix.os != 'windows'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -ldflags "-X main.defaultChasmHome=" \
            -o bin/chasm \
            ./cmd/cli

      - name: Build CLI (Windows)
        if: matrix.os == 'windows'
        env:
          GOOS: windows
          GOARCH: amd64
        run: |
          go build `
            -ldflags "-X main.defaultChasmHome=" `
            -o bin/chasm.exe `
            ./cmd/cli

      - name: Package (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        run: |
          TAG=${{ github.ref_name }}
          NAME=chasm-${TAG}-${{ matrix.os }}-${{ matrix.arch }}
          mkdir -p dist/${NAME}/bootstrap/bin
          cp bin/chasm                              dist/${NAME}/bin/chasm
          cp bootstrap/bin/${{ matrix.bin_name }}  dist/${NAME}/bootstrap/bin/${{ matrix.bin_name }}
          cp -r runtime                             dist/${NAME}/runtime
          cp -r engine                              dist/${NAME}/engine
          cp -r stdlib                              dist/${NAME}/stdlib 2>/dev/null || true
          cp -r examples                            dist/${NAME}/examples
          tar -czf dist/${NAME}.tar.gz -C dist ${NAME}
          echo "ASSET=dist/${NAME}.tar.gz" >> $GITHUB_ENV
          echo "ASSET_NAME=${NAME}.tar.gz" >> $GITHUB_ENV

      - name: Package (zip)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $TAG = "${{ github.ref_name }}"
          $NAME = "chasm-${TAG}-${{ matrix.os }}-${{ matrix.arch }}"
          New-Item -ItemType Directory -Path "dist/${NAME}/bootstrap/bin" -Force
          New-Item -ItemType Directory -Path "dist/${NAME}/bin" -Force
          Copy-Item "bin/chasm.exe"                             "dist/${NAME}/bin/chasm.exe"
          Copy-Item "bootstrap/bin/${{ matrix.bin_name }}"     "dist/${NAME}/bootstrap/bin/${{ matrix.bin_name }}"
          Copy-Item "runtime"                                   "dist/${NAME}/runtime" -Recurse
          Copy-Item "engine"                                    "dist/${NAME}/engine" -Recurse
          if (Test-Path "stdlib") { Copy-Item "stdlib" "dist/${NAME}/stdlib" -Recurse }
          Copy-Item "examples"                                  "dist/${NAME}/examples" -Recurse
          Compress-Archive -Path "dist/${NAME}" -DestinationPath "dist/${NAME}.zip"
          echo "ASSET=dist/${NAME}.zip" >> $env:GITHUB_ENV
          echo "ASSET_NAME=${NAME}.zip" >> $env:GITHUB_ENV

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          draft: false
          generate_release_notes: true
